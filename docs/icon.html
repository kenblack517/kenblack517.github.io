<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px;
      height: 400px;
      overflow: hidden;
    }
    .icon {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #f97316, #fbbf24);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      position: relative;
    }
    .icon::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.2), transparent 60%);
    }
    .letter {
      font-family: 'Georgia', serif;
      font-size: 200px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -8px;
      line-height: 1;
      text-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>
  <div class="icon">
    <span class="letter">K</span>
  </div>
</body>
</html>
