<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせ | SUISEN Volleyball Club</title>
  <meta name="description" content="SUISEN Volleyball Clubのお知らせ。試合結果・活動報告・メンバー募集など最新情報をお届けします。">
  <meta name="keywords" content="SUISEN,バレーボール,お知らせ,試合結果,活動報告">
  <meta property="og:title" content="お知らせ | SUISEN Volleyball Club">
  <meta property="og:description" content="SUISEN Volleyball Clubの最新お知らせ。">
  <meta property="og:url" content="https://suisenvbclub.com/news">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://suisenvbclub.com/news">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=1773884083">
  <link rel="stylesheet" href="css/news.css?v=1">
</head>
<body>

  <script src="js/header.js"></script>

  <!-- ページヘッダー -->
  <div class="page-hero">
    <div class="page-hero-bg"></div>
    <div class="page-hero-content">
      <p class="section-label" id="hero-label">INFORMATION</p>
      <h1 class="page-title" id="hero-title">お知らせ</h1>
    </div>
  </div>

  <!-- コンテンツエリア（一覧 or 詳細） -->
  <section class="section">
    <div class="container">
      <div id="news-content"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">
        <span class="logo-text">SUISEN</span>
        <span class="logo-sub">VOLLEYBALL CLUB</span>
      </div>
      <p class="footer-slogan">昼も夜も日本一</p>
      <nav class="footer-nav">
        <a href="./">HOME</a>
        <a href="about">ABOUT</a>
        <a href="players">PLAYERS</a>
        <a href="schedule">SCHEDULE</a>
        <a href="news">NEWS</a>
        <a href="contact">CONTACT</a>
      </nav>
      <div class="footer-sns"></div>
      <p class="footer-copy">&copy; 2026 SUISEN Volleyball Club. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="data/news.js"></script>
  <script src="js/main.js"></script>
  <script>
    const CAT_LABELS = { result: '大会報告', info: 'お知らせ', event: 'イベント' };

    function render() {
      const hash = location.hash.slice(1); // "news-001" or "cat-result" or ""
      const content = document.getElementById('news-content');
      window.scrollTo(0, 0);

      if (hash && !hash.startsWith('cat-')) {
        // 個別記事ページ
        const article = NEWS.find(n => n.id === hash);
        document.getElementById('hero-label').textContent = 'INFORMATION';
        document.getElementById('hero-title').textContent = article ? article.title : 'お知らせ';

        if (!article) {
          content.innerHTML = '<p class="news-empty">記事が見つかりませんでした。</p>';
          return;
        }

        const dateStr = article.date.replace(/-/g, '.').slice(2);
        const catLabel = CAT_LABELS[article.category] || article.category;
        const imgHtml = article.image
          ? `<img src="${article.image}" alt="${article.title}" class="news-detail-img">`
          : '';
        const schedLinkHtml = article.scheduleLink
          ? `<a href="schedule#results" class="btn btn-primary" style="margin-top:32px;display:inline-block;">試合結果を見る →</a>`
          : '';

        content.innerHTML = `
          <nav class="breadcrumb">
            <a href="./">HOME</a>
            <span>›</span>
            <a href="news">NEWS</a>
            <span>›</span>
            <span>${article.title}</span>
          </nav>
          <article class="news-detail-card">
            ${imgHtml}
            <div class="news-detail-body">
              <div class="news-card-meta">
                <span class="news-card-date">${dateStr}</span>
                <span class="news-cat ${article.category}">${catLabel}</span>
              </div>
              <h2 class="news-detail-title">${article.title}</h2>
              <div class="news-detail-text">${article.body.replace(/\n/g, '<br>')}</div>
              ${schedLinkHtml}
            </div>
          </article>`;
      } else {
        // 一覧ページ
        document.getElementById('hero-label').textContent = 'INFORMATION';
        document.getElementById('hero-title').textContent = 'お知らせ';

        if (NEWS.length === 0) {
          content.innerHTML = '<p class="news-empty">お知らせはありません。</p>';
          return;
        }

        let activeFilter = hash.startsWith('cat-') ? hash.slice(4) : 'all';

        function renderList() {
          const filtered = activeFilter === 'all' ? NEWS : NEWS.filter(n => n.category === activeFilter);
          const cards = filtered.length === 0
            ? '<p class="news-empty">該当するお知らせはありません。</p>'
            : filtered.map(n => {
                const dateStr = n.date.replace(/-/g, '.').slice(2);
                const catLabel = CAT_LABELS[n.category] || n.category;
                const imgHtml = n.image
                  ? `<img src="${n.image}" alt="${n.title}" class="news-card-img">`
                  : '';
                return `
                  <a class="news-card" href="news#${n.id}">
                    ${imgHtml}
                    <div class="news-card-body">
                      <div class="news-card-meta">
                        <span class="news-card-date">${dateStr}</span>
                        <span class="news-cat ${n.category}">${catLabel}</span>
                      </div>
                      <h2 class="news-card-title">${n.title}</h2>
                    </div>
                  </a>`;
              }).join('');

          document.getElementById('news-cards').innerHTML = cards;

          document.querySelectorAll('.news-filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.cat === activeFilter);
          });
        }

        content.innerHTML = `
          <nav class="breadcrumb">
            <a href="./">HOME</a>
            <span>›</span>
            <span>NEWS</span>
          </nav>
          <div class="news-filters">
            <button class="news-filter-btn active" data-cat="all">すべて</button>
            <button class="news-filter-btn" data-cat="result">大会報告</button>
            <button class="news-filter-btn" data-cat="info">お知らせ</button>
            <button class="news-filter-btn" data-cat="event">イベント</button>
          </div>
          <div id="news-cards" class="news-list-page"></div>`;

        content.querySelectorAll('.news-filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            activeFilter = btn.dataset.cat;
            renderList();
          });
        });

        renderList();
      }
    }

    render();
    window.addEventListener('hashchange', render);
  </script>
</body>
</html>
